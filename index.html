<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aarón Alcaide</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Jost:wght@100;200&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #f5f2ee;
      color: #2a2820;
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── FADE IN ── */
    @keyframes pageIn  { from { opacity: 0; } to { opacity: 1; } }
    @keyframes fadeUp  { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    body { animation: pageIn 0.4s ease both; }

    .page {
      width: 100%;
      max-width: 720px;
      padding: 0 6vw;
      text-align: center;
    }

    h1 {
      font-family: 'Jost', sans-serif;
      font-size: clamp(1.5rem, 4.5vw, 2.2rem);
      font-weight: 200;
      letter-spacing: 0.45em;
      text-transform: uppercase;
      color: #1a1814;
      margin-bottom: clamp(2.5rem, 5vw, 4rem);
      opacity: 0;
      animation: fadeUp 0.9s ease forwards;
      animation-delay: 0.1s;
    }

    .columns {
      display: flex;
      gap: clamp(2rem, 6vw, 5rem);
      justify-content: center;
      opacity: 0;
      animation: fadeUp 0.9s ease forwards;
      animation-delay: 0.4s;
    }

    .col { flex: 1; max-width: 300px; text-align: left; }

    .col-label {
      font-size: clamp(0.6rem, 1.5vw, 0.7rem);
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: #b0aa9e;
      margin-bottom: 1.4rem;
      padding-bottom: 0.9rem;
      border-bottom: 1px solid #ddd9d3;
    }

    ul { list-style: none; }

    li {
      padding: clamp(0.75rem, 2vw, 1rem) 0;
      border-bottom: 1px solid #e8e4df;
    }

    li:last-child { border-bottom: none; }

    /* ── LINK / BUTTON SHARED ── */
    .work-title {
      font-size: clamp(1.15rem, 3vw, 1.35rem);
      font-weight: 400;
      color: #3a362f;
      display: inline-block;
      text-decoration: none;
      background: none;
      border: none;
      font-family: 'Cormorant Garamond', serif;
      padding: 0;
      text-align: left;
      cursor: pointer;
      position: relative;
      transition: color 0.3s;
    }

    .work-title::after {
      content: '';
      position: absolute;
      left: 0; bottom: -1px;
      width: 0; height: 1px;
      background: #9a7a50;
      transition: width 0.35s ease;
    }

    .work-title:hover { color: #1a1814; }
    .work-title:hover::after { width: 100%; }

    .work-note {
      font-style: italic;
      font-size: clamp(0.82rem, 2vw, 0.9rem);
      color: #b0aa9e;
      margin-top: 0.2rem;
      display: block;
    }


    /* ── RESPONSIVE MÓVIL ── */
    @media (max-width: 580px) {
      html, body { align-items: flex-start; }
      .page { padding: 4rem 8vw 3rem; }
      .columns { flex-direction: column; gap: 2.5rem; }
      .col { max-width: 100%; }
    }
  </style>
</head>
<body>

<div class="page">
  <h1>Aarón Alcaide</h1>

  <div class="columns">

    <div class="col">
      <div class="col-label">Proyectos</div>
      <ul>
        <li>
          <a href="https://thedehron.com" target="_blank" class="work-title">VOCES DEL DEhRON</a>
          <span class="work-note">Relatos narrados</span>
        </li>
        <li>
          <a href="devenir.html" class="work-title">DEVENIR</a>
          <span class="work-note">Diario del pianista</span>
        </li>
        <li>
          <a href="fotografia.html" class="work-title">FOTOGRAFÍA</a>
          <span class="work-note">Galería &amp; sala virtual</span>
        </li>
      </ul>
    </div>

    <div class="col">
      <div class="col-label">Relatos</div>
      <ul>
        <li>
          <a href="tierra-humeda.pdf" target="_blank" class="work-title">Tierra Húmeda</a>
        </li>
        <li>
          <a href="epitafio.pdf" target="_blank" class="work-title">Epitafio de un Náufrago</a>
        </li>
        <li>
          <a href="el-otro-lado.pdf" target="_blank" class="work-title">El Otro Lado del Amanecer</a>
        </li>
      </ul>
    </div>

  </div>
</div>


<script>
  document.addEventListener('click', e => {
    const a = e.target.closest('a[href]');
    if (!a) return;
    const href = a.getAttribute('href');
    if (!href || href.startsWith('http') || href.startsWith('#') || a.target === '_blank') return;
    e.preventDefault();
    document.body.style.transition = 'opacity 0.3s ease';
    document.body.style.opacity = '0';
    setTimeout(() => { window.location.href = href; }, 300);
  });
</script>
</body>
</html>
